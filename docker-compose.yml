services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-performance-optimizer
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network
    labels:
      - "com.example.description=News Performance Optimizer Application"

networks:
  app-network:
    driver: bridge
